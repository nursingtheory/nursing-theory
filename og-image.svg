  <!-- Title -->
  <text x="600" y="240" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="bold">
    <tspan fill="#FFFFFF">The Nursing </tspan><tspan fill="#FBBF24" font-style="italic">Theory</tspan><tspan fill="#FFFFFF"> Generator</tspan>
